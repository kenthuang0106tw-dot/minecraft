<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blocklands</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f5f1e8;
      --panel: rgba(13, 18, 24, 0.62);
      --line: rgba(255, 255, 255, 0.18);
      --accent: #e7c86b;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111820;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      background: #6eb3df;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.45);
      border-radius: 2px;
    }

    .crosshair::before {
      left: 8px;
      top: 1px;
      width: 2px;
      height: 16px;
    }

    .crosshair::after {
      left: 1px;
      top: 8px;
      width: 16px;
      height: 2px;
    }

    .topbar {
      position: absolute;
      left: 18px;
      top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      font-size: 13px;
      line-height: 1;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0;
    }

    .metric {
      min-width: 76px;
      color: rgba(245, 241, 232, 0.78);
      font-variant-numeric: tabular-nums;
    }

    .healthbar {
      width: 112px;
      height: 10px;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 999px;
      background: rgba(0,0,0,0.28);
      overflow: hidden;
    }

    .healthfill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #d83d3d, #ffb34d);
      transition: width 140ms ease;
    }

    .hotbar {
      position: absolute;
      left: 50%;
      bottom: 24px;
      display: grid;
      grid-template-columns: repeat(6, 54px);
      gap: 6px;
      transform: translateX(-50%);
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(12px);
      pointer-events: auto;
      z-index: 30;
    }

    .slot {
      position: relative;
      width: 54px;
      height: 54px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
    }

    .slot.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(231, 200, 107, 0.8), 0 0 18px rgba(231, 200, 107, 0.22);
    }

    .swatch,
    .item-icon {
      position: absolute;
      left: 50%;
      top: 8px;
      width: 32px;
      height: 32px;
      border-radius: 5px;
      transform: translateX(-50%);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.2), transparent 36%),
        linear-gradient(315deg, rgba(0,0,0,0.24), transparent 42%),
        var(--c);
      box-shadow: inset 0 9px 0 rgba(255, 255, 255, 0.13), inset 0 -8px 0 rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .key {
      position: absolute;
      right: 5px;
      bottom: 2px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 11px;
      font-weight: 700;
    }


    .inventory-toggle {
      position: absolute;
      right: 18px;
      top: 16px;
      min-width: 82px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 800;
      pointer-events: auto;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      z-index: 35;
    }

    .inventory-panel {
      position: absolute;
      display: none;
      left: 50%;
      bottom: 96px;
      width: min(760px, calc(100vw - 28px));
      max-height: min(560px, calc(100vh - 154px));
      transform: translateX(-50%);
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(11, 16, 22, 0.82);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
      pointer-events: auto;
      overflow: hidden;
      z-index: 40;
    }

    .inventory-panel.open {
      display: block;
    }

    .inventory-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .inventory-close {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font-size: 18px;
      line-height: 1;
    }

    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
      gap: 6px;
      max-height: min(468px, calc(100vh - 220px));
      overflow: auto;
      padding-right: 3px;
    }

    .item-cell {
      position: relative;
      min-width: 0;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(245, 241, 232, 0.78);
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    .item-cell.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(231, 200, 107, 0.75);
    }

    .item-icon {
      top: 5px;
      width: 34px;
      height: 34px;
    }

    .item-number {
      position: absolute;
      left: 4px;
      bottom: 4px;
      right: 4px;
      overflow: hidden;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .shape-plank {
      background:
        repeating-linear-gradient(90deg, transparent 0 7px, rgba(0,0,0,0.22) 7px 8px),
        repeating-linear-gradient(0deg, transparent 0 12px, rgba(255,255,255,0.14) 12px 13px),
        var(--c);
    }

    .shape-log {
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,245,188,0.7) 0 18%, transparent 20%),
        repeating-radial-gradient(circle, var(--t) 0 4px, var(--c) 4px 8px);
    }

    .shape-leaf,
    .shape-plant,
    .shape-flower {
      border-radius: 42% 58% 48% 52%;
      background:
        radial-gradient(circle at 35% 34%, rgba(255,255,255,0.24) 0 16%, transparent 18%),
        radial-gradient(circle at 68% 60%, var(--t) 0 28%, transparent 30%),
        var(--c);
    }

    .shape-flower::after {
      content: "";
      position: absolute;
      left: 10px;
      top: 5px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--t);
      box-shadow: 0 9px 0 rgba(255,255,255,0.18), -7px 5px 0 rgba(255,255,255,0.12), 7px 5px 0 rgba(0,0,0,0.12);
    }

    .shape-stone {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.18), transparent 45%),
        var(--c);
      clip-path: polygon(9% 19%, 42% 4%, 90% 22%, 84% 82%, 48% 97%, 12% 77%);
    }

    .shape-ore {
      background:
        radial-gradient(circle at 30% 30%, var(--t) 0 12%, transparent 13%),
        radial-gradient(circle at 68% 42%, var(--t) 0 10%, transparent 11%),
        radial-gradient(circle at 50% 72%, var(--t) 0 13%, transparent 14%),
        linear-gradient(135deg, rgba(255,255,255,0.12), transparent),
        var(--c);
    }

    .shape-glass,
    .shape-water {
      border: 2px solid rgba(255,255,255,0.38);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.52) 0 18%, transparent 19% 58%, rgba(255,255,255,0.25) 59% 72%, transparent 73%),
        var(--c);
      opacity: 0.82;
    }

    .shape-candle {
      background: transparent;
      box-shadow: none;
    }

    .shape-candle::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 10px;
      width: 12px;
      height: 21px;
      border-radius: 3px 3px 2px 2px;
      background: var(--c);
      box-shadow: inset 3px 0 rgba(255,255,255,0.2), inset -3px 0 rgba(0,0,0,0.18);
    }

    .shape-candle::after {
      content: "";
      position: absolute;
      left: 13px;
      top: 1px;
      width: 9px;
      height: 13px;
      border-radius: 50% 50% 42% 42%;
      background: radial-gradient(circle at 50% 62%, #fff4b8 0 24%, #ffbc40 25% 68%, transparent 70%);
      filter: drop-shadow(0 0 5px rgba(255,189,66,0.8));
    }

    .shape-lamp {
      border-radius: 6px;
      background:
        radial-gradient(circle at 50% 50%, var(--t) 0 28%, rgba(255,225,130,0.38) 29% 46%, transparent 47%),
        linear-gradient(90deg, rgba(0,0,0,0.45) 0 16%, transparent 17% 83%, rgba(0,0,0,0.45) 84%),
        linear-gradient(0deg, rgba(0,0,0,0.45) 0 15%, transparent 16% 84%, rgba(0,0,0,0.45) 85%),
        var(--c);
      box-shadow: 0 0 12px rgba(255, 214, 115, 0.58), inset 0 0 0 2px rgba(0,0,0,0.28);
    }

    .shape-book,
    .shape-crate {
      background:
        linear-gradient(90deg, rgba(0,0,0,0.3) 0 16%, transparent 17%),
        repeating-linear-gradient(90deg, var(--c) 0 9px, var(--t) 9px 14px);
    }

    .shape-lava {
      background:
        radial-gradient(circle at 28% 34%, #ffe46a 0 15%, transparent 16%),
        radial-gradient(circle at 70% 65%, #ffae36 0 18%, transparent 19%),
        linear-gradient(135deg, #7a1f18, var(--c));
      box-shadow: 0 0 12px rgba(255,116,33,0.72), inset 0 -8px rgba(0,0,0,0.18);
    }

    .shape-sword {
      background: transparent;
      box-shadow: none;
    }

    .shape-sword::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 1px;
      width: 6px;
      height: 25px;
      border-radius: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.42), var(--c), rgba(0,0,0,0.24));
      transform: rotate(42deg);
      transform-origin: 50% 85%;
    }

    .shape-sword::after {
      content: "";
      position: absolute;
      left: 10px;
      top: 21px;
      width: 19px;
      height: 5px;
      border-radius: 2px;
      background: #5b3a24;
      transform: rotate(42deg);
    }

    .shape-armor {
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(0,0,0,0.22) 19% 25%, transparent 26% 74%, rgba(0,0,0,0.22) 75% 81%, transparent 82%),
        linear-gradient(180deg, rgba(255,255,255,0.28), transparent 38%),
        var(--c);
      clip-path: polygon(28% 5%, 72% 5%, 94% 28%, 78% 96%, 22% 96%, 6% 28%);
    }
    .prompt {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(420px, calc(100vw - 34px));
      transform: translate(-50%, -50%);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(11, 16, 22, 0.76);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
      text-align: center;
      pointer-events: auto;
      z-index: 60;
    }

    .prompt h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0;
    }

    .prompt p {
      margin: 0 0 16px;
      color: rgba(245, 241, 232, 0.78);
      line-height: 1.55;
      font-size: 14px;
    }

    .prompt button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 7px;
      background: #e7c86b;
      color: #1b1608;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }

    .prompt button:hover { background: #f2d77d; }
    .hidden { display: none; }

    .touch-controls {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
      touch-action: none;
      user-select: none;
      z-index: 10;
    }

    .stick-zone {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 44vw;
      height: 52vh;
      pointer-events: auto;
      z-index: 11;
    }

    .stick {
      position: absolute;
      left: 28px;
      bottom: 84px;
      width: 112px;
      height: 112px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background: rgba(13, 18, 24, 0.38);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .stick-knob {
      position: absolute;
      left: 36px;
      top: 36px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(245, 241, 232, 0.82);
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.3);
      transform: translate(0, 0);
    }

    .look-zone {
      position: absolute;
      right: 0;
      top: 0;
      width: 62vw;
      height: 100vh;
      pointer-events: auto;
      z-index: 11;
    }

    .touch-actions {
      position: absolute;
      right: 18px;
      bottom: 88px;
      display: grid;
      grid-template-columns: repeat(2, 58px);
      gap: 10px;
      pointer-events: auto;
      z-index: 20;
    }

    .touch-button {
      width: 58px;
      height: 58px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      background: rgba(13, 18, 24, 0.46);
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(10px);
      touch-action: none;
    }

    .touch-button:active {
      background: rgba(231, 200, 107, 0.64);
      color: #1b1608;
    }

    @media (hover: none), (pointer: coarse) {
      canvas { cursor: default; }
      .touch-controls { display: block; }
      .hotbar { bottom: 10px; }
    }

    @media (max-width: 560px) {
      .topbar {
        left: 10px;
        top: 10px;
        max-width: calc(100vw - 20px);
        flex-wrap: wrap;
      }

      .hotbar {
        bottom: 14px;
        grid-template-columns: repeat(6, 42px);
        gap: 4px;
      }

      .slot {
        width: 42px;
        height: 42px;
      }

      .swatch {
        left: 8px;
        top: 7px;
        width: 25px;
        height: 25px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" width="480" height="270"></canvas>
  <div class="hud">
    <div class="topbar">
      <span class="brand">Blocklands</span>
      <span class="metric" id="pos">0 0 0</span>
      <span class="metric" id="fps">60 fps</span>
      <span class="metric" id="gear">hands / cloth</span>
      <div class="healthbar" title="Health"><div class="healthfill" id="healthFill"></div></div>
    </div>
    <div class="crosshair"></div>
    <div class="hotbar" id="hotbar"></div>
    <button class="inventory-toggle" id="inventoryToggle" type="button">Items</button>
    <div class="inventory-panel" id="inventoryPanel">
      <div class="inventory-head">
        <span id="inventoryTitle">Items</span>
        <button class="inventory-close" id="inventoryClose" type="button" aria-label="Close inventory">×</button>
      </div>
      <div class="inventory-grid" id="inventoryGrid"></div>
    </div>
    <div class="touch-controls" id="touchControls">
      <div class="stick-zone" id="stickZone">
        <div class="stick">
          <div class="stick-knob" id="stickKnob"></div>
        </div>
      </div>
      <div class="look-zone" id="lookZone"></div>
      <div class="touch-actions">
        <button class="touch-button" id="jumpBtn" type="button">Jump</button>
        <button class="touch-button" id="attackBtn" type="button">Hit</button>
        <button class="touch-button" id="mineBtn" type="button">Mine</button>
        <button class="touch-button" id="placeBtn" type="button">Place</button>
      </div>
    </div>
    <div class="prompt" id="prompt">
      <h1>Blocklands</h1>
      <p>Desktop: WASD to move, Space to jump, left click to hit or mine, right click to place, F to attack. Phone: use the left stick to move, drag the right side to look, then tap Jump, Hit, Mine, or Place.</p>
      <button id="start">Start</button>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d", { alpha: false });
      const posEl = document.getElementById("pos");
      const fpsEl = document.getElementById("fps");
      const gearEl = document.getElementById("gear");
      const healthFillEl = document.getElementById("healthFill");
      const promptEl = document.getElementById("prompt");
      const startBtn = document.getElementById("start");
      const hotbarEl = document.getElementById("hotbar");
      const inventoryToggle = document.getElementById("inventoryToggle");
      const inventoryPanel = document.getElementById("inventoryPanel");
      const inventoryGrid = document.getElementById("inventoryGrid");
      const inventoryTitle = document.getElementById("inventoryTitle");
      const inventoryClose = document.getElementById("inventoryClose");
      const stickZone = document.getElementById("stickZone");
      const stickKnob = document.getElementById("stickKnob");
      const lookZone = document.getElementById("lookZone");
      const jumpBtn = document.getElementById("jumpBtn");
      const attackBtn = document.getElementById("attackBtn");
      const mineBtn = document.getElementById("mineBtn");
      const placeBtn = document.getElementById("placeBtn");
      const isTouch = matchMedia("(hover: none), (pointer: coarse)").matches;

      const W = 64;
      const D = 64;
      const H = 32;
      const FOV = Math.PI / 2.35;
      const SCALE = Math.max(1, Math.floor(Math.min(innerWidth / 420, innerHeight / 240)));
      const RW = Math.max(240, Math.min(640, Math.floor(innerWidth / SCALE)));
      const RH = Math.max(160, Math.min(360, Math.floor(innerHeight / SCALE)));
      canvas.width = RW;
      canvas.height = RH;

      function hslToRgb(h, s, l) {
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const hp = h / 60;
        const x = c * (1 - Math.abs((hp % 2) - 1));
        let r = 0;
        let g = 0;
        let b = 0;
        if (hp < 1) [r, g, b] = [c, x, 0];
        else if (hp < 2) [r, g, b] = [x, c, 0];
        else if (hp < 3) [r, g, b] = [0, c, x];
        else if (hp < 4) [r, g, b] = [0, x, c];
        else if (hp < 5) [r, g, b] = [x, 0, c];
        else [r, g, b] = [c, 0, x];
        const m = l - c / 2;
        return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
      }

      function shapeForName(name) {
        if (/sword|staff/.test(name)) return "sword";
        if (/armor/.test(name)) return "armor";
        if (/candle/.test(name)) return "candle";
        if (/lamp|lantern|torch|glowing/.test(name)) return "lamp";
        if (/ore|gem/.test(name)) return "ore";
        if (/log/.test(name)) return "log";
        if (/plank|bamboo/.test(name)) return "plank";
        if (/leaf|leaves|moss/.test(name)) return "leaf";
        if (/flower|rose|cactus|reed|coral/.test(name)) return "flower";
        if (/glass|ice/.test(name)) return "glass";
        if (/water/.test(name)) return "water";
        if (/lava/.test(name)) return "lava";
        if (/bookshelf|barrel|crate|crafting/.test(name)) return "crate";
        if (/stone|slate|granite|diorite|andesite|basalt|obsidian|marble|limestone|cobble|quartz/.test(name)) return "stone";
        return "cube";
      }

      function block(name, color, top = null, glow = 0) {
        return { name, color, top: top || color, glow, shape: shapeForName(name) };
      }

      const baseBlocks = [
        block("grass block", [74, 156, 76], [112, 184, 79]),
        block("dirt", [122, 86, 52]),
        block("stone", [120, 124, 128]),
        block("oak log", [132, 91, 47], [154, 112, 62]),
        block("leaf block", [48, 127, 72], [62, 150, 81]),
        block("sand", [213, 192, 124]),
        block("brick block", [158, 76, 61])
      ];

      const palette = [
        ["white", 42, 43, 39], ["light gray", 215, 0.1, 0.68], ["gray", 215, 0.08, 0.42],
        ["black", 220, 0.12, 0.13], ["brown", 28, 0.5, 0.33], ["red", 0, 0.62, 0.47],
        ["orange", 28, 0.74, 0.52], ["yellow", 49, 0.78, 0.58], ["lime", 92, 0.54, 0.49],
        ["green", 132, 0.46, 0.36], ["cyan", 182, 0.55, 0.45], ["light blue", 202, 0.64, 0.58],
        ["blue", 224, 0.58, 0.43], ["purple", 272, 0.48, 0.48], ["magenta", 306, 0.56, 0.53],
        ["pink", 334, 0.64, 0.63]
      ];

      function coloredSet(suffix, satBoost, lightBoost, glow = 0) {
        return palette.map(([name, hue, sat, light]) => {
          const color = hslToRgb(hue, Math.min(0.9, sat + satBoost), Math.min(0.82, light + lightBoost));
          const top = hslToRgb((hue + 9) % 360, Math.min(0.92, sat + satBoost + 0.06), Math.min(0.88, light + lightBoost + 0.05));
          return block(`${name} ${suffix}`, color, top, glow);
        });
      }

      const extraBlocks = [
        block("oak planks", [156, 119, 69], [178, 137, 82]),
        block("birch planks", [206, 184, 119], [226, 205, 139]),

      function idx(x, y, z) {
        return x + y * W + z * W * D;
      }

      function inBounds(x, y, z) {
        return x >= 0 && x < W && y >= 0 && y < D && z >= 0 && z < H;
      }

      function getBlock(x, y, z) {
        x = Math.floor(x);
        y = Math.floor(y);
        z = Math.floor(z);
        if (!inBounds(x, y, z)) return z < 0 ? 3 : 0;
        return world[idx(x, y, z)];
      }

      function setBlock(x, y, z, id) {
        x = Math.floor(x);
        y = Math.floor(y);
        z = Math.floor(z);
        if (inBounds(x, y, z)) world[idx(x, y, z)] = id;
      }

      function hash(x, y) {
        let n = x * 374761393 + y * 668265263;
        n = (n ^ (n >> 13)) * 1274126177;
        return ((n ^ (n >> 16)) >>> 0) / 4294967295;
      }

      function smoothNoise(x, y, scale) {
        const ix = Math.floor(x / scale);
        const iy = Math.floor(y / scale);
        const fx = x / scale - ix;
        const fy = y / scale - iy;
        const a = hash(ix, iy);
        const b = hash(ix + 1, iy);
        const c = hash(ix, iy + 1);
        const d = hash(ix + 1, iy + 1);
        const u = fx * fx * (3 - 2 * fx);
        const v = fy * fy * (3 - 2 * fy);
        return (a + (b - a) * u) + ((c + (d - c) * u) - (a + (b - a) * u)) * v;
      }

      function terrainAt(x, y) {
        x = Math.max(0, Math.min(W - 1, Math.floor(x)));
        y = Math.max(0, Math.min(D - 1, Math.floor(y)));
        return terrain[x + y * W] || 0;
      }

      function highestSolid(x, y) {
        x = Math.floor(x);
        y = Math.floor(y);
        if (x < 0 || x >= W || y < 0 || y >= D) return 0;
        for (let z = H - 1; z >= 0; z--) {
          if (getBlock(x, y, z)) return z;
        }
        return 0;
      }

      function placeTree(x, y, h, type) {
        const trunkId = type === "glow" ? idOf("cherry planks", 4) : type === "pine" ? idOf("spruce planks", 4) : 4;
        const leafId = type === "blossom" ? idOf("flowering leaves", 5) : type === "pine" ? idOf("pine needles", 5) : type === "moss" ? idOf("moss block", 5) : 5;
        const trunkHeight = type === "pine" ? 7 : type === "moss" ? 5 : 4 + Math.floor(hash(x, y) * 3);
        for (let z = h + 1; z <= h + trunkHeight; z++) setBlock(x, y, z, trunkId);

        if (type === "pine") {
          for (let oz = 2; oz <= trunkHeight + 1; oz++) {
            const radius = Math.max(1, Math.floor((trunkHeight + 2 - oz) / 2));
            for (let ox = -radius; ox <= radius; ox++) {
              for (let oy = -radius; oy <= radius; oy++) {
                if (Math.abs(ox) + Math.abs(oy) <= radius + 1) setBlock(x + ox, y + oy, h + oz, leafId);
              }
            }
          }
          return;
        }

        const crown = type === "moss" ? 3 : 2;
        for (let ox = -crown; ox <= crown; ox++) {
          for (let oy = -crown; oy <= crown; oy++) {
            for (let oz = trunkHeight - 2; oz <= trunkHeight + 2; oz++) {
              const d = Math.abs(ox) + Math.abs(oy) + Math.max(0, Math.abs(oz - trunkHeight) - 1);
              if (d <= crown + 2 && hash(x + ox * 5, y + oy * 7 + oz) > 0.12) setBlock(x + ox, y + oy, h + oz, leafId);
            }
          }
        }

        if (type === "glow") {
          setBlock(x + 1, y, h + trunkHeight - 1, idOf("glow lamp", 5));
          setBlock(x - 1, y + 1, h + trunkHeight, idOf("paper lantern", 5));
        }
      }

      function carveCaves() {
        for (let x = 2; x < W - 2; x++) {
          for (let y = 2; y < D - 2; y++) {
            const surface = terrainAt(x, y);
            for (let z = 4; z < Math.min(surface - 2, H - 3); z++) {
              const tunnel = Math.sin(x * 0.31 + z * 0.46) + Math.cos(y * 0.27 - z * 0.39);
              const chamber = smoothNoise(x + z * 2, y - z * 3, 9) + smoothNoise(x - 70, y + z * 2, 15);
              if (tunnel + chamber > 2.02 || chamber > 1.58) {
                for (let ox = -1; ox <= 1; ox++) {
                  for (let oy = -1; oy <= 1; oy++) {
                    if (Math.abs(ox) + Math.abs(oy) < 3) setBlock(x + ox, y + oy, z, 0);
                  }
                }
              }
            }
          }
        }

        for (let x = 8; x < W - 8; x += 11) {
          for (let y = 7; y < D - 8; y += 13) {
            if (hash(x, y) > 0.48) {
              const z = Math.max(5, Math.min(terrainAt(x, y) - 4, 12));
              for (let r = 0; r < 4; r++) {
                for (let ox = -r; ox <= r; ox++) {
                  for (let oy = -r; oy <= r; oy++) {
                    for (let oz = -1; oz <= 1; oz++) {
                      if (Math.hypot(ox, oy, oz * 1.6) <= r + 0.2) setBlock(x + ox, y + oy, z + oz, 0);
                    }
                  }
                }
              }
              setBlock(x, y, z - 1, idOf("glow lamp", 3));
            }
          }
        }

        for (let i = 0; i < 9; i++) {
          const cx = 7 + Math.floor(hash(i * 19, i + 41) * (W - 14));
          const cy = 7 + Math.floor(hash(i - 13, i * 29) * (D - 14));
          const surface = terrainAt(cx, cy);
          const dir = hash(cx, cy) > 0.5 ? 1 : -1;
          for (let step = 0; step < 7; step++) {
            const x = cx + step * dir;
            const y = cy + Math.floor(Math.sin(step * 0.9) * 2);
            const zBase = surface - Math.floor(step * 0.7);
            for (let ox = -2; ox <= 2; ox++) {
              for (let oz = -1; oz <= 2; oz++) {
                if (Math.abs(ox) + Math.max(0, oz) < 4) setBlock(x, y + ox, zBase + oz, 0);
              }
            }
          }
        }
      }

      function generateWorld() {
        for (let x = 0; x < W; x++) {
          for (let y = 0; y < D; y++) {
            const broad = smoothNoise(x, y, 18) * 5;
            const ridge = Math.abs(smoothNoise(x - 60, y + 25, 9) - 0.5) * 8;
            const hill = broad + smoothNoise(x + 90, y - 40, 7) * 3 + ridge;
            const h = Math.max(7, Math.min(H - 8, Math.floor(9 + hill)));
            terrain[x + y * W] = h;
            for (let z = 0; z <= h; z++) {
              const beach = h < 12 || smoothNoise(x + 20, y - 20, 6) < 0.18;
              const id = z === h ? (beach ? 6 : 1) : (z > h - 4 ? 2 : 3);
              setBlock(x, y, z, id);
            }
          }
        }

        carveCaves();

        for (let x = 4; x < W - 4; x++) {
          for (let y = 4; y < D - 4; y++) {
            const h = highestSolid(x, y);
            if (h < 12 || h > H - 10) continue;
            const chance = hash(x + 11, y - 3);
            if (chance > 0.973) {
              const typeRoll = hash(x - 17, y + 31);
              const type = typeRoll > 0.82 ? "glow" : typeRoll > 0.62 ? "blossom" : typeRoll > 0.38 ? "pine" : typeRoll > 0.22 ? "moss" : "oak";
              placeTree(x, y, h, type);
            } else if (chance < 0.018 && h > 14) {
              setBlock(x, y, h + 1, idOf("cactus", 5));
              setBlock(x, y, h + 2, idOf("cactus", 5));
            } else if (hash(x + 100, y + 4) > 0.992) {
              setBlock(x, y, h + 1, idOf("flower pot", 5));
            }
          }
        }

        for (let x = 28; x < 36; x++) {
          for (let y = 30; y < 38; y++) {
            for (let z = 14; z < 18; z++) setBlock(x, y, z, 0);
            if (x === 28 || x === 35 || y === 30 || y === 37) setBlock(x, y, 14, 7);
          }
        }
      }

      function spawnEnemies() {
        enemies.length = 0;
        enemyTypes.forEach((type, typeIndex) => {
          let placed = 0;
          for (let attempt = 0; attempt < 80 && placed < 3; attempt++) {
            const x = 6 + Math.floor(hash(typeIndex * 17 + attempt, attempt + 3) * (W - 12));
            const y = 6 + Math.floor(hash(attempt - 9, typeIndex * 23 + attempt) * (D - 12));
            if (Math.hypot(x - player.x, y - player.y) < 10) continue;
            const h = highestSolid(x, y);
            if (h < 8 || h > H - 5 || getBlock(x, y, h + 1)) continue;
            enemies.push({
              typeIndex,
              x: x + 0.5,
              y: y + 0.5,
              z: h + 1.05,
              vx: 0,
              vy: 0,
              wander: hash(x, y) * Math.PI * 2,
              clock: hash(y, x) * 10,
              attackCooldown: 0,
              hp: type.mode === "heavy" ? 4 : 2
            });
            placed++;
          }
        });
      }

      function updateEnemies(dt) {
        enemies.forEach((enemy) => {
          const type = enemyTypes[enemy.typeIndex];
          enemy.clock += dt;
          enemy.attackCooldown = Math.max(0, enemy.attackCooldown - dt);
          const dx = player.x - enemy.x;
          const dy = player.y - enemy.y;
          const dist = Math.hypot(dx, dy) || 1;
          const seesPlayer = dist < (type.mode === "heavy" ? 9 : 14);
          let dirX = Math.cos(enemy.wander);
          let dirY = Math.sin(enemy.wander);
          if (seesPlayer) {
            dirX = dx / dist;
            dirY = dy / dist;
          } else if (enemy.clock % 3 < dt) {
            enemy.wander += (hash(enemy.x + enemy.clock, enemy.y) - 0.5) * 1.8;
          }

          const burst = type.mode === "charge" && seesPlayer && Math.sin(enemy.clock * 3.2) > 0.72 ? 1.85 : 1;
          const speed = type.speed * burst;
          const nx = enemy.x + dirX * speed * dt;
          const ny = enemy.y + dirY * speed * dt;
          const ground = highestSolid(nx, ny);
          const targetZ = type.mode === "fly" ? ground + 2.4 + Math.sin(enemy.clock * 2.4) * 0.55 : ground + 1.05;
          if (!getBlock(nx, ny, Math.floor(targetZ))) {
            enemy.x = nx;
            enemy.y = ny;
          } else {
            enemy.wander += 1.7;
          }
          enemy.z += (targetZ - enemy.z) * Math.min(1, dt * 5);

          if (dist < type.size + 0.48 && Math.abs(player.z - enemy.z) < 2.1 && enemy.attackCooldown <= 0) {
            damagePlayer(type.damage, enemy.x, enemy.y);
            enemy.attackCooldown = 1.15;
          }
        });
      }

      function makeItemIcon(id, baseClass) {
        const icon = document.createElement("span");

        icon.className = `${baseClass} item-icon shape-${item.shape || "cube"}`;

      function updateHud() {
        const weapon = blocks[gear.weapon];

      function respawnPlayer() {
        player.x = W / 2 + 0.5;
        player.y = D / 2 + 0.5;
        player.z = highestSolid(player.x, player.y) + 3;
        player.vx = player.vy = player.vz = 0;
        player.health = player.maxHealth;
        player.invulnerable = 1.2;
        updateHud();

      function damagePlayer(amount, sourceX, sourceY) {
        if (player.invulnerable > 0) return;
        const armor = blocks[gear.armor];
        const reduced = Math.max(1, amount - (armor.defense || 0));
        player.health = Math.max(0, player.health - reduced);
        player.invulnerable = 0.85;
        const dx = player.x - sourceX;
        const dy = player.y - sourceY;
        const dist = Math.hypot(dx, dy) || 1;
        player.vx += (dx / dist) * 4.2;
        player.vy += (dy / dist) * 4.2;
        player.vz = Math.max(player.vz, 3.2);
        if (player.health <= 0) respawnPlayer();
        updateHud();
      }

      function attackEnemy() {
        const weapon = blocks[gear.weapon];
        const damage = weapon.damage || 1;
        const range = weapon.range || 2.4;
        const cy = Math.cos(player.yaw);
        const sy = Math.sin(player.yaw);
        let best = null;
        let bestScore = Infinity;
        enemies.forEach((enemy) => {
          const dx = enemy.x - player.x;
          const dy = enemy.y - player.y;
          const dz = enemy.z - player.z;
          const dist = Math.hypot(dx, dy, dz);
          if (dist > range) return;
          const forward = (dx * cy + dy * sy) / (Math.hypot(dx, dy) || 1);
          if (forward < 0.58) return;
          const score = dist - forward;
          if (score < bestScore) {
            bestScore = score;
            best = enemy;
          }
        });
        if (!best) return false;
        best.hp -= damage;
        const dx = best.x - player.x;
        const dy = best.y - player.y;
        const dist = Math.hypot(dx, dy) || 1;
        best.x += (dx / dist) * 0.55;
        best.y += (dy / dist) * 0.55;
        best.clock += 0.35;
        if (best.hp <= 0) {
          const index = enemies.indexOf(best);
          if (index >= 0) enemies.splice(index, 1);
        }
        return true;
      }

      function rgb(c) {
        return `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
      }

      function shade(c, amount) {
        return `rgb(${Math.max(0, Math.min(255, c[0] * amount)) | 0}, ${Math.max(0, Math.min(255, c[1] * amount)) | 0}, ${Math.max(0, Math.min(255, c[2] * amount)) | 0})`;
      }

      function collides(nx, ny, nz) {
        const r = 0.28;
        const minX = Math.floor(nx - r);
        const maxX = Math.floor(nx + r);
        const minY = Math.floor(ny - r);
        const maxY = Math.floor(ny + r);
        const minZ = Math.floor(nz - 1.62);
        const maxZ = Math.floor(nz + 0.12);
        for (let x = minX; x <= maxX; x++) {
          for (let y = minY; y <= maxY; y++) {
            for (let z = minZ; z <= maxZ; z++) {
              if (getBlock(x, y, z)) return true;
            }
          }
        }
        return false;
      }

      function moveAxis(axis, amount) {
        if (amount === 0) return;
        const next = { x: player.x, y: player.y, z: player.z };
        next[axis] += amount;
        if (!collides(next.x, next.y, next.z)) {
          player[axis] = next[axis];
        } else {
          if (axis === "z") {
            player.grounded = amount < 0;
            player.vz = 0;
          }
          if (axis === "x") player.vx = 0;
          if (axis === "y") player.vy = 0;
        }
      }

      function update(dt) {
        player.invulnerable = Math.max(0, player.invulnerable - dt);
        const forward = (keys.has("KeyW") ? 1 : 0) - (keys.has("KeyS") ? 1 : 0) - touchMove.y;
        const strafe = (keys.has("KeyD") ? 1 : 0) - (keys.has("KeyA") ? 1 : 0) + touchMove.x;
        const speed = keys.has("ShiftLeft") ? 8.2 : 5.2;
        const sin = Math.sin(player.yaw);
        const cos = Math.cos(player.yaw);
        const len = Math.hypot(forward, strafe) || 1;
        const ax = ((cos * forward - sin * strafe) / len) * speed;
        const ay = ((sin * forward + cos * strafe) / len) * speed;
        const drag = Math.pow(0.0009, dt);
        player.vx = player.vx * drag + ax * dt * 8;
        player.vy = player.vy * drag + ay * dt * 8;
        player.vz -= 18 * dt;
        if (keys.has("Space") && player.grounded) {
          player.vz = 7.2;
          player.grounded = false;
        }

        moveAxis("x", player.vx * dt);
        moveAxis("y", player.vy * dt);
        moveAxis("z", player.vz * dt);

        if (player.z < 3) {
          player.x = W / 2 + 0.5;
          player.y = D / 2 + 0.5;
          player.z = 23;
          player.vx = player.vy = player.vz = 0;
          player.health = Math.max(1, player.health - 2);
          updateHud();
        }

        updateEnemies(dt);
      }

      function castRay(dir, maxDist) {
        let x = Math.floor(player.x);
        let y = Math.floor(player.y);
        let z = Math.floor(player.z);
        const stepX = dir.x >= 0 ? 1 : -1;
        const stepY = dir.y >= 0 ? 1 : -1;
        const stepZ = dir.z >= 0 ? 1 : -1;
        const tDeltaX = Math.abs(1 / (dir.x || 0.00001));
        const tDeltaY = Math.abs(1 / (dir.y || 0.00001));
        const tDeltaZ = Math.abs(1 / (dir.z || 0.00001));
        let tMaxX = ((dir.x >= 0 ? x + 1 - player.x : player.x - x) * tDeltaX);
        let tMaxY = ((dir.y >= 0 ? y + 1 - player.y : player.y - y) * tDeltaY);
        let tMaxZ = ((dir.z >= 0 ? z + 1 - player.z : player.z - z) * tDeltaZ);
        let face = 2;
        let px = x;
        let py = y;
        let pz = z;
        let dist = 0;

        for (let i = 0; i < 96 && dist <= maxDist; i++) {
          const id = getBlock(x, y, z);
          if (id) return { id, x, y, z, px, py, pz, face, dist };
          px = x;
          py = y;
          pz = z;
          if (tMaxX < tMaxY && tMaxX < tMaxZ) {
            x += stepX;
            dist = tMaxX;
            tMaxX += tDeltaX;
            face = 0;
          } else if (tMaxY < tMaxZ) {
            y += stepY;
            dist = tMaxY;
            tMaxY += tDeltaY;
            face = 1;
          } else {
            z += stepZ;
            dist = tMaxZ;
            tMaxZ += tDeltaZ;
            face = 2;
          }
        }
        return null;
      }

      function cameraDir(px, py) {
        const aspect = RW / RH;
        const nx = (px / RW - 0.5) * 2;
        const ny = (0.5 - py / RH) * 2;
        const tan = Math.tan(FOV / 2);
        const cy = Math.cos(player.yaw);
        const sy = Math.sin(player.yaw);
        const cp = Math.cos(player.pitch);
        const sp = Math.sin(player.pitch);
        const forward = { x: cy * cp, y: sy * cp, z: sp };
        const right = { x: -sy, y: cy, z: 0 };
        const up = { x: -cy * sp, y: -sy * sp, z: cp };
        let x = forward.x + right.x * nx * tan * aspect + up.x * ny * tan;
        let y = forward.y + right.y * nx * tan * aspect + up.y * ny * tan;
        let z = forward.z + right.z * nx * tan * aspect + up.z * ny * tan;
        const mag = Math.hypot(x, y, z);
        return { x: x / mag, y: y / mag, z: z / mag };
      }

      function renderSky() {
        const g = ctx.createLinearGradient(0, 0, 0, RH);
        g.addColorStop(0, "#7cc7ef");
        g.addColorStop(0.55, "#b9e0f2");
        g.addColorStop(0.56, "#769564");
        g.addColorStop(1, "#43543c");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, RW, RH);
        ctx.fillStyle = "rgba(255, 239, 172, 0.9)";
        ctx.beginPath();
        ctx.arc(RW * 0.82, RH * 0.18, Math.max(10, RH * 0.055), 0, Math.PI * 2);
        ctx.fill();
      }

      function drawEnemySprite(enemy, sx, sy, size, dist) {
        const type = enemyTypes[enemy.typeIndex];
        const body = rgb(type.body);
        const eye = rgb(type.eye);
        const shadow = Math.max(0.42, 1 - dist / 24);
        ctx.save();
        ctx.translate(sx, sy);
        ctx.scale(size / 38, size / 38);
        ctx.globalAlpha = Math.min(1, 0.55 + shadow);

        if (type.mode === "fly") {
          ctx.fillStyle = "rgba(120, 235, 255, 0.22)";
          ctx.beginPath();
          ctx.arc(0, -2, 21, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = body;
          ctx.beginPath();
          ctx.arc(0, -2, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = eye;
          ctx.fillRect(-5, -5, 3, 3);
          ctx.fillRect(3, -5, 3, 3);
        } else if (type.mode === "heavy") {
          ctx.fillStyle = shade(type.body, 0.66);
          ctx.fillRect(-16, -18, 32, 34);
          ctx.fillStyle = body;
          ctx.fillRect(-13, -22, 26, 18);
          ctx.fillStyle = eye;
          ctx.fillRect(-8, -14, 5, 4);
          ctx.fillRect(3, -14, 5, 4);
        } else if (type.mode === "charge") {
          ctx.fillStyle = shade(type.body, 0.72);
          ctx.fillRect(-18, -10, 36, 20);
          ctx.fillStyle = body;
          ctx.fillRect(-11, -20, 22, 17);
          ctx.fillStyle = "#e9d29a";
          ctx.fillRect(-20, -16, 7, 5);
          ctx.fillRect(13, -16, 7, 5);
          ctx.fillStyle = eye;
          ctx.fillRect(-5, -13, 3, 3);
          ctx.fillRect(3, -13, 3, 3);
        } else if (type.mode === "dart") {
          ctx.fillStyle = body;
          ctx.fillRect(-10, -20, 20, 30);
          ctx.fillStyle = shade(type.body, 0.66);
          ctx.fillRect(-16, 1, 9, 12);
          ctx.fillRect(7, 1, 9, 12);
          ctx.fillStyle = eye;
          ctx.fillRect(-6, -13, 4, 4);
          ctx.fillRect(2, -13, 4, 4);
        } else {
          ctx.fillStyle = body;
          ctx.fillRect(-13, -22, 26, 36);
          ctx.fillStyle = shade(type.body, 0.7);
          ctx.fillRect(-18, -3, 7, 16);
          ctx.fillRect(11, -3, 7, 16);
          ctx.fillStyle = eye;
          ctx.fillRect(-7, -14, 4, 5);
          ctx.fillRect(3, -14, 4, 5);
        }

        ctx.restore();
      }

      function renderEnemies(depthColumns, step) {
        const aspect = RW / RH;
        const tan = Math.tan(FOV / 2);
        const cy = Math.cos(player.yaw);
        const sy = Math.sin(player.yaw);
        const sorted = [...enemies].sort((a, b) => {
          const da = Math.hypot(a.x - player.x, a.y - player.y);
          const db = Math.hypot(b.x - player.x, b.y - player.y);
          return db - da;
        });

        sorted.forEach((enemy) => {
          const type = enemyTypes[enemy.typeIndex];
          const dx = enemy.x - player.x;
          const dy = enemy.y - player.y;
          const dz = enemy.z - player.z;
          const forward = dx * cy + dy * sy;
          if (forward <= 0.25 || forward > 34) return;
          const right = -dx * sy + dy * cy;
          const sx = RW / 2 + (right / (forward * tan * aspect)) * RW / 2;
          const syScreen = RH / 2 - ((dz / forward) - Math.tan(player.pitch)) / tan * RH / 2;
          const size = Math.max(8, (type.size * 118) / forward);
          if (sx < -size || sx > RW + size || syScreen < -size || syScreen > RH + size) return;
          const column = Math.max(0, Math.min(depthColumns.length - 1, Math.floor(sx / step)));
          if (depthColumns[column] < forward - 0.8) return;
          drawEnemySprite(enemy, sx, syScreen, size, forward);
        });
      }

      function render() {
        renderSky();
        const step = RW < 360 ? 2 : 3;
        const maxDist = 36;
        const depthColumns = new Float32Array(Math.ceil(RW / step));
        depthColumns.fill(maxDist);
        target = castRay(cameraDir(RW / 2, RH / 2), 6);

        for (let y = 0; y < RH; y += step) {
          for (let x = 0; x < RW; x += step) {
            const hit = castRay(cameraDir(x + step / 2, y + step / 2), maxDist);
            if (!hit) continue;
            const column = Math.floor(x / step);
            if (hit.dist < depthColumns[column]) depthColumns[column] = hit.dist;
            const block = blocks[hit.id];
            const topColor = block.top || block.color;
            const base = hit.face === 2 ? topColor : block.color;
            const faceShade = hit.face === 0 ? 0.72 : hit.face === 1 ? 0.62 : 0.94;
            const fog = Math.max(0.34, 1 - hit.dist / maxDist);
            const checker = ((hit.x + hit.y + hit.z) & 1) ? 0.95 : 1.04;
            const glow = block.glow || 0;
            ctx.fillStyle = shade(base, Math.min(1.35, faceShade * fog * checker + glow));
            ctx.fillRect(x, y, step + 1, step + 1);
          }
        }

        renderEnemies(depthColumns, step);

        if (target) {
          ctx.strokeStyle = "rgba(255,255,255,0.55)";
          ctx.lineWidth = 1;
          ctx.strokeRect(RW / 2 - 12, RH / 2 - 12, 24, 24);
        }

        if (player.invulnerable > 0) {
          ctx.fillStyle = `rgba(210, 35, 35, ${Math.min(0.24, player.invulnerable * 0.18)})`;
          ctx.fillRect(0, 0, RW, RH);
        }
      }

      function tick(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        render();
        frames++;
        if (now - fpsClock > 500) {
          fpsEl.textContent = `${Math.round(frames * 1000 / (now - fpsClock))} fps`;
          frames = 0;
          fpsClock = now;
        }
        posEl.textContent = `${player.x.toFixed(1)} ${player.y.toFixed(1)} ${player.z.toFixed(1)}`;
        updateHud();
        requestAnimationFrame(tick);
      }

      function mine() {
        if (attackEnemy()) return;
        if (!target || target.dist > 6) return;
        setBlock(target.x, target.y, target.z, 0);
      }

      function place() {
        if (!target || target.dist > 6) return;
        const id = hotbar[selected];
        if (blocks[id].itemType) return;
        if (!getBlock(target.px, target.py, target.pz)) {
          setBlock(target.px, target.py, target.pz, id);
          if (collides(player.x, player.y, player.z)) setBlock(target.px, target.py, target.pz, 0);
        }
      }

      function startGame() {
        promptEl.classList.add("hidden");
        if (!isTouch && canvas.requestPointerLock) canvas.requestPointerLock();
      }

      function jump() {
        if (player.grounded) {
          player.vz = 7.2;
          player.grounded = false;
        }
      }

      function stopStick() {
        stickPointer = null;
        touchMove = { x: 0, y: 0 };
        stickKnob.style.transform = "translate(0, 0)";
      }

      function updateStick(event) {
        const rect = stickZone.getBoundingClientRect();
        const cx = rect.left + 84;
        const cy = rect.bottom - 140;
        const dx = event.clientX - cx;
        const dy = event.clientY - cy;
        const dist = Math.min(42, Math.hypot(dx, dy));
        const angle = Math.atan2(dy, dx);
        const x = Math.cos(angle) * dist;
        const y = Math.sin(angle) * dist;
        touchMove = { x: x / 42, y: y / 42 };
        stickKnob.style.transform = `translate(${x}px, ${y}px)`;
      }

      addEventListener("keydown", (event) => {
        keys.add(event.code);
        if (/^Digit[1-6]$/.test(event.code)) {
          selected = Number(event.code.slice(5)) - 1;
          buildHotbar();
        }
        if (event.code === "KeyF") attackEnemy();
      });

      addEventListener("keyup", (event) => keys.delete(event.code));

      addEventListener("resize", () => location.reload());

      canvas.addEventListener("mousemove", (event) => {
        if (document.pointerLockElement !== canvas) return;
        player.yaw += event.movementX * 0.0024;
        player.pitch = Math.max(-1.35, Math.min(1.25, player.pitch - event.movementY * 0.0024));
      });

      canvas.addEventListener("mousedown", (event) => {
        if (isTouch) return;
        if (document.pointerLockElement !== canvas) {
          startGame();
          return;
        }
        if (event.button === 0) mine();
        if (event.button === 2) place();
      });

      canvas.addEventListener("contextmenu", (event) => event.preventDefault());

      document.addEventListener("pointerlockchange", () => {
        if (isTouch) return;
        promptEl.classList.toggle("hidden", document.pointerLockElement === canvas);
      });

      stickZone.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        startGame();
        stickPointer = event.pointerId;
        stickZone.setPointerCapture(event.pointerId);
        updateStick(event);
      });

      stickZone.addEventListener("pointermove", (event) => {
        if (event.pointerId === stickPointer) updateStick(event);
      });

      stickZone.addEventListener("pointerup", (event) => {
        if (event.pointerId === stickPointer) stopStick();
      });

      stickZone.addEventListener("pointercancel", (event) => {
        if (event.pointerId === stickPointer) stopStick();
      });

      lookZone.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        startGame();
        lookPointer = event.pointerId;
        lastLook = { x: event.clientX, y: event.clientY };
        lookZone.setPointerCapture(event.pointerId);
      });

      lookZone.addEventListener("pointermove", (event) => {
        if (event.pointerId !== lookPointer || !lastLook) return;
        const dx = event.clientX - lastLook.x;
        const dy = event.clientY - lastLook.y;
        lastLook = { x: event.clientX, y: event.clientY };
        player.yaw += dx * 0.006;
        player.pitch = Math.max(-1.35, Math.min(1.25, player.pitch - dy * 0.006));
      });

      lookZone.addEventListener("pointerup", (event) => {
        if (event.pointerId === lookPointer) {
          lookPointer = null;
          lastLook = null;
        }
      });

      lookZone.addEventListener("pointercancel", (event) => {
        if (event.pointerId === lookPointer) {
          lookPointer = null;
          lastLook = null;
        }
      });

      jumpBtn.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        startGame();
        jump();
      });

      attackBtn.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        startGame();
        attackEnemy();
      });

      mineBtn.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        startGame();
        mine();
      });

      placeBtn.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        startGame();
        place();
      });

      inventoryToggle.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        ignoreInventoryClickUntil = performance.now() + 450;
        toggleInventory();
      });

      inventoryToggle.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (performance.now() < ignoreInventoryClickUntil) return;
        toggleInventory();
      });

      inventoryClose.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        ignoreInventoryClickUntil = performance.now() + 450;
        toggleInventory(false);
      });

      inventoryClose.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (performance.now() < ignoreInventoryClickUntil) return;
        toggleInventory(false);
      });

      startBtn.addEventListener("click", startGame);

      generateWorld();
      spawnEnemies();
      buildHotbar();
      buildInventory();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
